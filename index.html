<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로또 번호 추첨</title>
    <style>
        :root {
            --bg: #0f172a;
            --panel: #1e293b;
            --text: #e2e8f0;
            --muted: #94a3b8;
            --accent: #6366f1;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(160deg, #0f172a, #1e1b4b);
            font-family: "Segoe UI", "Malgun Gothic", sans-serif;
            color: var(--text);
            padding: 24px;
        }
        .card {
            width: 100%;
            max-width: 560px;
            background: var(--panel);
            border-radius: 20px;
            padding: 36px 32px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.45);
            text-align: center;
        }
        h1 {
            margin: 0 0 6px;
            font-size: 28px;
            letter-spacing: 1px;
        }
        p.subtitle {
            margin: 0 0 28px;
            color: var(--muted);
            font-size: 14px;
        }
        .balls {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 12px;
            min-height: 76px;
            margin-bottom: 8px;
        }
        .plus {
            font-size: 22px;
            color: var(--muted);
            font-weight: bold;
        }
        .ball {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 20px;
            color: #fff;
            box-shadow: inset 0 -4px 6px rgba(0,0,0,0.25), 0 4px 8px rgba(0,0,0,0.35);
            opacity: 0;
            transform: scale(0.3);
            animation: pop 0.45s cubic-bezier(.34,1.56,.64,1) forwards;
        }
        @keyframes pop {
            to { opacity: 1; transform: scale(1); }
        }
        /* 로또 공식 번호대 색상 */
        .c1 { background: #fbc400; } /* 1-10 노랑 */
        .c2 { background: #69c8f2; } /* 11-20 파랑 */
        .c3 { background: #ff7272; } /* 21-30 빨강 */
        .c4 { background: #aaaaaa; } /* 31-40 회색 */
        .c5 { background: #b0d840; } /* 41-45 초록 */

        .bonus-label {
            font-size: 13px;
            color: var(--muted);
            margin: 18px 0 6px;
        }

        button {
            margin-top: 26px;
            padding: 14px 32px;
            font-size: 16px;
            font-weight: 600;
            color: #fff;
            background: var(--accent);
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: transform 0.15s ease, background 0.15s ease;
        }
        button:hover { background: #4f46e5; }
        button:active { transform: scale(0.97); }
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .history {
            margin-top: 28px;
            text-align: left;
        }
        .history h2 {
            font-size: 14px;
            color: var(--muted);
            margin: 0 0 10px;
            font-weight: 500;
        }
        .history-item {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
            font-size: 12px;
            color: var(--muted);
            padding: 8px 0;
            border-top: 1px solid rgba(255,255,255,0.06);
        }
        .mini {
            width: 26px;
            height: 26px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 12px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>🎱 로또 번호 추첨기</h1>
        <p class="subtitle">버튼을 누르면 1~45 중 6개의 번호를 무작위로 뽑아드립니다</p>

        <div class="balls" id="balls"></div>

        <div class="bonus-label">보너스 번호</div>
        <div class="balls" id="bonus"></div>

        <button id="drawBtn">번호 추첨하기</button>

        <div class="history" id="history" style="display:none;">
            <h2>지난 추첨 기록</h2>
            <div id="historyList"></div>
        </div>
    </div>

    <script>
        const ballsEl = document.getElementById('balls');
        const bonusEl = document.getElementById('bonus');
        const drawBtn = document.getElementById('drawBtn');
        const historyEl = document.getElementById('history');
        const historyListEl = document.getElementById('historyList');
        const history = [];

        function colorClass(n) {
            if (n <= 10) return 'c1';
            if (n <= 20) return 'c2';
            if (n <= 30) return 'c3';
            if (n <= 40) return 'c4';
            return 'c5';
        }

        function drawNumbers(count, exclude = new Set()) {
            const pool = [];
            for (let i = 1; i <= 45; i++) {
                if (!exclude.has(i)) pool.push(i);
            }
            const result = [];
            for (let i = 0; i < count; i++) {
                const idx = Math.floor(Math.random() * pool.length);
                result.push(pool.splice(idx, 1)[0]);
            }
            return result;
        }

        function renderBall(container, number, delayIndex) {
            const ball = document.createElement('div');
            ball.className = `ball ${colorClass(number)}`;
            ball.textContent = number;
            ball.style.animationDelay = `${delayIndex * 0.12}s`;
            container.appendChild(ball);
        }

        function renderMiniBall(container, number) {
            const ball = document.createElement('span');
            ball.className = `mini ${colorClass(number)}`;
            ball.textContent = number;
            container.appendChild(ball);
        }

        function draw() {
            drawBtn.disabled = true;
            ballsEl.innerHTML = '';
            bonusEl.innerHTML = '';

            const mainNumbers = drawNumbers(6).sort((a, b) => a - b);
            const bonusNumber = drawNumbers(1, new Set(mainNumbers))[0];

            mainNumbers.forEach((n, i) => renderBall(ballsEl, n, i));
            renderBall(bonusEl, bonusNumber, mainNumbers.length);

            history.unshift({ main: mainNumbers, bonus: bonusNumber });
            if (history.length > 5) history.pop();
            renderHistory();

            setTimeout(() => { drawBtn.disabled = false; }, 700);
        }

        function renderHistory() {
            if (history.length === 0) return;
            historyEl.style.display = 'block';
            historyListEl.innerHTML = '';
            history.forEach(entry => {
                const row = document.createElement('div');
                row.className = 'history-item';
                entry.main.forEach(n => renderMiniBall(row, n));
                const plus = document.createElement('span');
                plus.textContent = '+';
                plus.style.margin = '0 2px';
                row.appendChild(plus);
                renderMiniBall(row, entry.bonus);
                historyListEl.appendChild(row);
            });
        }

        drawBtn.addEventListener('click', draw);
    </script>
</body>
</html>
