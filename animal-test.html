<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>동물상 테스트</title>
    <style>
        :root {
            --bg-grad-1: #0f172a;
            --bg-grad-2: #1e1b4b;
            --panel: #1e293b;
            --text: #e2e8f0;
            --muted: #94a3b8;
            --accent: #6366f1;
            --border: rgba(255,255,255,0.06);
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(160deg, var(--bg-grad-1), var(--bg-grad-2));
            font-family: "Segoe UI", "Malgun Gothic", sans-serif;
            color: var(--text);
            padding: 24px;
        }
        .card {
            width: 100%;
            max-width: 480px;
            background: var(--panel);
            border-radius: 20px;
            padding: 36px 32px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.25);
            text-align: center;
        }
        h1 {
            margin: 0 0 6px;
            font-size: 26px;
        }
        p.subtitle {
            margin: 0 0 24px;
            color: var(--muted);
            font-size: 14px;
            line-height: 1.5;
        }
        #startBtn {
            padding: 14px 32px;
            font-size: 16px;
            font-weight: 600;
            color: #fff;
            background: var(--accent);
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: transform 0.15s ease, background 0.15s ease;
        }
        #startBtn:hover { background: #4f46e5; }
        #startBtn:active { transform: scale(0.97); }
        #startBtn:disabled { opacity: 0.5; cursor: not-allowed; }

        #webcam-container {
            display: flex;
            justify-content: center;
            margin: 24px 0;
        }
        #webcam-container canvas {
            border-radius: 16px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.35);
        }

        #label-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
            text-align: left;
        }
        .result-row {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .result-row .label-line {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
        }
        .result-row .label-name {
            font-weight: 600;
        }
        .result-row .label-percent {
            color: var(--muted);
        }
        .bar-track {
            width: 100%;
            height: 10px;
            border-radius: 999px;
            background: var(--border);
            overflow: hidden;
        }
        .bar-fill {
            height: 100%;
            background: var(--accent);
            border-radius: 999px;
            transition: width 0.2s ease;
        }

        .back-link {
            display: inline-block;
            margin-top: 24px;
            font-size: 13px;
            color: var(--muted);
            text-decoration: none;
        }
        .back-link:hover { color: var(--text); }
    </style>
</head>
<body>
    <div class="card">
        <h1>🐶🐱 동물상 테스트</h1>
        <p class="subtitle">웹캠으로 얼굴을 비추면 AI가 강아지상인지 고양이상인지 판별해드립니다.</p>

        <button type="button" id="startBtn" onclick="init()">테스트 시작</button>

        <div id="webcam-container"></div>
        <div id="label-container"></div>

        <a class="back-link" href="index.html">← 로또 추첨기로 돌아가기</a>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
    <script type="text/javascript">
        const URL = "https://teachablemachine.withgoogle.com/models/4Hmq4xZZv/";

        let model, webcam, labelContainer, maxPredictions;
        const startBtn = document.getElementById("startBtn");

        async function init() {
            startBtn.disabled = true;
            startBtn.textContent = "로딩 중...";

            const modelURL = URL + "model.json";
            const metadataURL = URL + "metadata.json";

            model = await tmImage.load(modelURL, metadataURL);
            maxPredictions = model.getTotalClasses();

            const flip = true;
            webcam = new tmImage.Webcam(240, 240, flip);
            await webcam.setup();
            await webcam.play();
            window.requestAnimationFrame(loop);

            document.getElementById("webcam-container").innerHTML = "";
            document.getElementById("webcam-container").appendChild(webcam.canvas);

            labelContainer = document.getElementById("label-container");
            labelContainer.innerHTML = "";
            for (let i = 0; i < maxPredictions; i++) {
                const row = document.createElement("div");
                row.className = "result-row";
                row.innerHTML = `
                    <div class="label-line">
                        <span class="label-name"></span>
                        <span class="label-percent"></span>
                    </div>
                    <div class="bar-track"><div class="bar-fill" style="width:0%"></div></div>
                `;
                labelContainer.appendChild(row);
            }

            startBtn.style.display = "none";
        }

        async function loop() {
            webcam.update();
            await predict();
            window.requestAnimationFrame(loop);
        }

        async function predict() {
            const prediction = await model.predict(webcam.canvas);
            const rows = labelContainer.querySelectorAll(".result-row");
            for (let i = 0; i < maxPredictions; i++) {
                const percent = (prediction[i].probability * 100).toFixed(0);
                const row = rows[i];
                row.querySelector(".label-name").textContent = prediction[i].className;
                row.querySelector(".label-percent").textContent = `${percent}%`;
                row.querySelector(".bar-fill").style.width = `${percent}%`;
            }
        }
    </script>
</body>
</html>
