<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>동물상 테스트</title>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6417299670040046"
     crossorigin="anonymous"></script>
    <style>
        :root {
            --bg-grad-1: #0f172a;
            --bg-grad-2: #1e1b4b;
            --panel: #1e293b;
            --text: #e2e8f0;
            --muted: #94a3b8;
            --accent: #6366f1;
            --border: rgba(255,255,255,0.06);
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(160deg, var(--bg-grad-1), var(--bg-grad-2));
            font-family: "Segoe UI", "Malgun Gothic", sans-serif;
            color: var(--text);
            padding: 24px;
        }
        .card {
            width: 100%;
            max-width: 480px;
            background: var(--panel);
            border-radius: 20px;
            padding: 36px 32px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.25);
            text-align: center;
        }
        h1 {
            margin: 0 0 6px;
            font-size: 26px;
        }
        p.subtitle {
            margin: 0 0 24px;
            color: var(--muted);
            font-size: 14px;
            line-height: 1.5;
        }
        #fileInput { display: none; }
        .upload-label {
            display: inline-block;
            padding: 14px 32px;
            font-size: 16px;
            font-weight: 600;
            color: #fff;
            background: var(--accent);
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: transform 0.15s ease, background 0.15s ease;
        }
        .upload-label:hover { background: #4f46e5; }
        .upload-label:active { transform: scale(0.97); }

        #status {
            margin-top: 12px;
            font-size: 13px;
            color: var(--muted);
        }

        #preview-container {
            display: flex;
            justify-content: center;
            margin: 24px 0;
        }
        #preview-container img {
            max-width: 240px;
            max-height: 240px;
            border-radius: 16px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.35);
        }

        #label-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
            text-align: left;
        }
        .result-row {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .result-row .label-line {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
        }
        .result-row .label-name {
            font-weight: 600;
        }
        .result-row .label-percent {
            color: var(--muted);
        }
        .bar-track {
            width: 100%;
            height: 10px;
            border-radius: 999px;
            background: var(--border);
            overflow: hidden;
        }
        .bar-fill {
            height: 100%;
            background: var(--accent);
            border-radius: 999px;
            transition: width 0.2s ease;
        }

        .back-link {
            display: inline-block;
            margin-top: 24px;
            font-size: 13px;
            color: var(--muted);
            text-decoration: none;
        }
        .back-link:hover { color: var(--text); }
    </style>
</head>
<body>
    <div class="card">
        <h1>🐶🐱 동물상 테스트</h1>
        <p class="subtitle">사진을 올리면 AI가 강아지상인지 고양이상인지 판별해드립니다.</p>

        <label class="upload-label" for="fileInput">사진 선택하기</label>
        <input type="file" id="fileInput" accept="image/*">
        <div id="status"></div>

        <div id="preview-container"></div>
        <div id="label-container"></div>

        <a class="back-link" href="index.html">← 로또 추첨기로 돌아가기</a>
        <br>
        <a class="back-link" href="privacy.html">개인정보처리방침</a>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
    <script type="text/javascript">
        const URL = "https://teachablemachine.withgoogle.com/models/4Hmq4xZZv/";

        let model, maxPredictions;
        const fileInput = document.getElementById("fileInput");
        const statusEl = document.getElementById("status");
        const previewContainer = document.getElementById("preview-container");
        const labelContainer = document.getElementById("label-container");

        async function loadModel() {
            if (model) return;
            statusEl.textContent = "모델 로딩 중...";
            const modelURL = URL + "model.json";
            const metadataURL = URL + "metadata.json";
            model = await tmImage.load(modelURL, metadataURL);
            maxPredictions = model.getTotalClasses();
            statusEl.textContent = "";
        }

        fileInput.addEventListener("change", async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            await loadModel();

            const img = document.createElement("img");
            img.src = window.URL.createObjectURL(file);

            previewContainer.innerHTML = "";
            previewContainer.appendChild(img);
            labelContainer.innerHTML = "";
            statusEl.textContent = "분석 중...";

            img.onload = async () => {
                await predict(img);
                statusEl.textContent = "";
            };
        });

        async function predict(imageElement) {
            const prediction = await model.predict(imageElement);
            prediction.sort((a, b) => b.probability - a.probability);

            for (let i = 0; i < maxPredictions; i++) {
                const percent = (prediction[i].probability * 100).toFixed(0);
                const row = document.createElement("div");
                row.className = "result-row";
                row.innerHTML = `
                    <div class="label-line">
                        <span class="label-name">${prediction[i].className}</span>
                        <span class="label-percent">${percent}%</span>
                    </div>
                    <div class="bar-track"><div class="bar-fill" style="width:${percent}%"></div></div>
                `;
                labelContainer.appendChild(row);
            }
        }
    </script>
</body>
</html>
